site_name: Digital Edge
site_description: Practical digital skills articles, events, community news, people profiles, and podcast links.
site_url: https://jacobbpp.github.io/Digital-Edge-Demo/

theme:
  name: mkdocs
  locale: en
  nav_style: primary
  highlightjs: false

hooks:
  - hooks/search_filter.py

markdown_extensions:
  - meta

nav:
  - Home: index.md
  - Articles: articles/index.md
  - Events: events.md
  - Community News: community-news/index.md
  - Guides: guides/index.md
  - People: people/index.md
  - Tech Sphere Podcast: podcast.md

extra_css:
  - assets/css/site.css

extra_javascript:
  - assets/js/site.js
